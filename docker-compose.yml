
services:
  db:
    image: postgres:15
    container_name: loldrafter-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - /home/nientemale/Progetti/.docker-data/postgres:/var/lib/postgresql/data
